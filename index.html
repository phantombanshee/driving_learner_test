<!DOCTYPE html>
<html>
<head>
<title>Learner Permit Practice Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Learner Permit Practice Test</h1>
<p>Select number of questions</p>

<button onclick="startQuiz(25)">25 Questions</button>

</div>

<script>
function startQuiz(num){
localStorage.setItem("quizLength", num)
window.location.href = "quiz.html"
}
</script>

</body>
</html>
